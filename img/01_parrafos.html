<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parrafos y Encabezados</title>
</head>
<body>
    <!--Titulos o Encabezados:
    Se tienen 6 tipos de encabezados, desde el h1 hasta el h6. -->
    <!--(h$*6) Crea 6 titulos en orden del 1 al 6 Emmet-->
    <h1>Titulo</h1>
    <!--El h1 se utiliza una sola vez por página web esto es debido a que el h1 tiene una importancia en el CEO lo que es el posicionamiento web, es decir, Google le da mucha importancia al h1-->
    <h2>Subtitulo</h2>
    <h3>Subtitulo</h3>
    <h4>Subtitulo</h4>
    <h5>Subtitulo</h5>
    <h6>Subtitulo</h6>
    <!--Desde el h2 hasta el h6, se pueden utilizar las veces que sean necesarias según el contenido que se quiera recrear.  -->
    <!--Párrafo: Los párrafos deben tener una idea o un punto específico.
    Cada párrafo escrito debe contener un concepto, una idea. Es decir, puede describir una sección o elemento, hasta un mensaje en el chat. Por ejemplo en una sección se habla sobre los beneficios del
    ejercicio. Un párrafo puede tratar de mejorar la salud cardiovascular y otro puede ser sobre los beneficios y cuidados de la salud mental. Finalmente, debe existir un motivo para que exista un párrafo.  -->
    <p>
        Lorem ipsum dolor sit amet consectetur, adipisicing elit. Incidunt excepturi voluptas ratione accusamus quibusdam nulla, maxime veniam nesciunt minus debitis quis, ut deleniti, corporis qui atque. Id molestiae ratione magnam.
    </p>
    <!--(CTRL+SHIFT+P) o (ALT+Z) Ajusta el contenido del párrafo a la ventana del editor-->
    <!--Existen algunas tecnologías de asistencia como lectores de pantalla, que ayudan a las personas con discapacidad visual a navegar por el contenido web.
    Por ejemplo: cuando estas tecnologías leen el h1 de la página, entienden de qué trata la página por el h1. Por temas de accesibilidad web es importante que se utilice solo un h1 por página. -->
</body>
</html>
