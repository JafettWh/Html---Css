<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imágenes</title>
    <!-- https://www.magnific.com/es/fotos-vectores-gratis/elementos-espacio-png-->
</head>
<body>
    <!-- Etiquetas de bloque y Etiquetas de línea -->
    <h1>Imágenes</h1>
    <!-- Las imágenes se insertan en HTML usando la etiqueta img. Esta etiqueta es un elemento vacio, lo que significa que no tiene etiqueta de cierre. La sintaxtis básica para insertar una imagen es:-->
    
    <!-- Vale la pena recordar que el atributo title proporciona un tooltip que se muestra cuando el usuario pasa el mouse sobre la imágen. -->
    <img src="04_imagen.png" alt="Imagen de Saturno" title="Saturno" width="200" height="200">
    <!-- Para que los lectores de pantalla puedan saber de que se trata la imágen el atributo alt(Alternative Text) es muy importante puesto que proporciona una descripción textual de la imágen para accesibilidad y como fallback si no se carga. El texto alternativo debe ser descriptivo y conciso, y debe transmitir la información esencial que la imágen representa. Como por ejemplo: si la imagen es un logotipo de una empresa, el texto alternativo podría ser "Logotipo de la empresa XYZ". Si la imagen es una fotografía de un paisaje, el texto alternativo podría ser "Fotografía de un paisaje con montañas y lago". En resumen, el atributo alt proporciona una descripción de la imagen en caso de que no se pueda cargar. -->
    
    <!--Self Closing Tags son etiquetas que se autocierran-->
</body>
</html>
